services:
  postgres:
    image: postgres:15-alpine
    container_name: myhub-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-myhub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-1800}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-myhub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  myhub:
    build:
      context: .
      args:
        - VITE_DISCORD_USER_ID=${VITE_DISCORD_USER_ID}
        - VITE_ADMIN_DISCORD_ID=${ADMIN_DISCORD_ID}
        - VITE_GITHUB_USERNAME=${VITE_GITHUB_USERNAME}
        - VITE_GITHUB_FEATURED_REPO=${VITE_GITHUB_FEATURED_REPO}
        - VITE_SOCIAL_DISCORD=${VITE_SOCIAL_DISCORD}
        - VITE_SOCIAL_TELEGRAM=${VITE_SOCIAL_TELEGRAM}
        - VITE_SOCIAL_INSTAGRAM=${VITE_SOCIAL_INSTAGRAM}
        - VITE_SOCIAL_YOUTUBE=${VITE_SOCIAL_YOUTUBE}
        - VITE_SOCIAL_TIKTOK=${VITE_SOCIAL_TIKTOK}
        - VITE_SOCIAL_FACEBOOK=${VITE_SOCIAL_FACEBOOK}
    container_name: myhub-app
    restart: unless-stopped
    network_mode: "host"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - FRONTEND_PORT=${FRONTEND_PORT:-1500}
      - BACKEND_PORT=${BACKEND_PORT:-1600}
      - DISCORD_USER_ID=${VITE_DISCORD_USER_ID}
      - POSTGRES_HOST=localhost
      - POSTGRES_PORT=${POSTGRES_PORT:-1800}
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-myhub}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:1600/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: myhub-cloudflared
    restart: unless-stopped
    network_mode: "host"
    depends_on:
      myhub:
        condition: service_healthy
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflare-tunnel-config.yml:/etc/cloudflared/config.yml:ro

volumes:
  postgres_data:
